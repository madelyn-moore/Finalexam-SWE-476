name: taskhub

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest

    # TODO:
    # Add a container name for the database service.
    container_name: taskhub-db

    # TODO:
    # Add the environment variables needed by SQL Server.
    # Include:
    # - ACCEPT_EULA
    # - MSSQL_PID
    # - MSSQL_SA_PASSWORD
    environment:
        ACCEPT_EULA: "Y"
        MSSQL_PID: "Express"
        MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}

    # TODO:
    # Expose port 1433 from the container to the host
    # by using the MSSQL_HOST_PORT variable on the host side.
    ports:
      - "${MSSQL_HOST_PORT}:1433"

    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrations
    container_name: taskhub-migrations
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=${MSSQL_DATABASE};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    # TODO:
    # Build the app service from the current folder using:
    # - Dockerfile
    # - the final stage
    build: 
      context: .
      dockerfile: Dockerfile
      target: final

    # TODO:
    # Add an image name for the app container.
    image: taskhub

    # TODO:
    # Add a container name for the app service.
    container_name: taskhub

    # TODO:
    # Add the environment variables needed by the app.
    # Include:
    # - ASPNETCORE_ENVIRONMENT
    # - ASPNETCORE_URLS
    # - ConnectionStrings__DefaultConnection
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=${MSSQL_DATABASE};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true


    # TODO:
    # Expose port 8080 from the container to the host
    # by using the TASKHUB_HTTP_PORT variable on the host side.
    ports:
      - "${TASKHUB_HTTP_PORT}:8080"

    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped
